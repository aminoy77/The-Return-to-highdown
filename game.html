<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MUD Multiplayer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0a0a;--bg2:#111;--bg3:#181818;--border:#252525;
  --gold:#c9a84c;--gold2:#e8c55c;--green:#4caf50;--red:#e53935;
  --red2:#ff1744;--blue:#42a5f5;--mana:#5c6bc0;--purple:#ab47bc;
  --orange:#ff9800;--text:#ccc;--dim:#555;--dim2:#222;
}
body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;height:100vh;overflow:hidden;display:flex;flex-direction:column;}

/* LOGIN */
#lo{position:fixed;inset:0;background:rgba(0,0,0,.93);display:flex;align-items:center;justify-content:center;z-index:999;}
#lb{background:var(--bg2);border:1px solid var(--gold);border-radius:8px;padding:34px 42px;text-align:center;min-width:330px;}
#lb h1{color:var(--gold);font-size:22px;margin-bottom:5px;}
#lb p{color:var(--dim);font-size:12px;margin-bottom:18px;}
.li{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:9px 12px;font-family:monospace;font-size:13px;border-radius:4px;outline:none;margin-bottom:9px;transition:border-color .15s;}
.li:focus{border-color:var(--gold);}
.li::placeholder{color:var(--dim);}
#login-ip{font-size:11px;color:var(--dim);margin-bottom:12px;}
#login-ip input{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:3px;font-family:monospace;font-size:12px;width:200px;outline:none;}
#login-ip input:focus{border-color:var(--gold);}
#lbtn{width:100%;background:var(--gold);border:none;color:#000;padding:10px;font-weight:bold;font-size:14px;cursor:pointer;border-radius:4px;font-family:monospace;transition:background .15s;}
#lbtn:hover{background:var(--gold2);}
#lerr{color:var(--red);font-size:11px;margin-top:9px;min-height:16px;}
.tabs{display:flex;gap:6px;margin-bottom:14px;}
.tab{flex:1;padding:6px;border:1px solid var(--border);border-radius:4px;cursor:pointer;font-family:monospace;font-size:12px;color:var(--dim);background:var(--bg3);transition:all .15s;}
.tab.active{background:var(--gold);color:#000;border-color:var(--gold);}
#reg-panel{display:none;}

/* TOPBAR */
#top{background:var(--bg2);border-bottom:1px solid var(--border);padding:5px 12px;display:flex;align-items:center;gap:10px;flex-shrink:0;font-size:11px;}
#top-title{color:var(--gold);font-weight:bold;font-size:13px;}
#top-player{color:var(--text);}
#top-player span{color:var(--gold);}
#cdot{margin-left:auto;width:7px;height:7px;border-radius:50%;background:var(--red);}
#cdot.on{background:var(--green);}

/* LAYOUT */
#app{display:grid;grid-template-columns:200px 1fr;grid-template-rows:1fr;flex:1;overflow:hidden;gap:1px;background:var(--border);}

/* STATS */
#sp{background:var(--bg2);padding:11px 10px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;}
.sh{color:var(--gold);font-size:10px;text-transform:uppercase;letter-spacing:1.5px;border-bottom:1px solid var(--border);padding-bottom:4px;}
.pid{text-align:center;}
.pid-n{font-size:14px;color:var(--gold);font-weight:bold;}
.pid-c{font-size:11px;color:var(--dim);margin-top:1px;}
.lvr{display:flex;align-items:center;justify-content:space-between;font-size:11px;}
.lvb{background:var(--gold);color:#000;padding:2px 7px;border-radius:9px;font-weight:bold;font-size:11px;}
.bl{display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px;}
.bl-n{color:var(--dim);}
.bw{width:100%;height:12px;background:var(--bg3);border-radius:6px;overflow:hidden;border:1px solid var(--border);margin-bottom:7px;}
.bf{height:100%;border-radius:6px;transition:width .4s, background .4s;}
.bf-hp{background:var(--red);}
.bf-mp{background:var(--mana);}
.xw{width:100%;height:5px;background:var(--bg3);border-radius:2px;overflow:hidden;border:1px solid var(--border);margin-top:2px;}
.bf-xp{background:var(--purple);border-radius:0;}
.sr{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid var(--dim2);font-size:11px;}
.sr:last-child{border-bottom:none;}
.sr-l{color:var(--dim);}
.sr-v{color:var(--text);font-weight:bold;}

/* Botones rápidos */
.qbtns{display:flex;flex-wrap:wrap;gap:3px;}
.qb{flex:1;min-width:40px;background:var(--bg3);border:1px solid var(--border);color:var(--dim);padding:4px 3px;font-size:10px;cursor:pointer;border-radius:3px;font-family:monospace;text-align:center;transition:all .15s;}
.qb:hover{color:var(--text);border-color:var(--dim);}
.qb.combat{border-color:#2d4a2d;color:#81c784;}
.qb.combat:hover{background:#0a1a0a;}
.qb.move{border-color:#1a2a3a;color:#64b5f6;}
.qb.move:hover{background:#0a1020;}

/* GAME */
#gp{display:flex;flex-direction:column;background:var(--bg);overflow:hidden;}
#glog{flex:1;overflow-y:auto;padding:10px 14px;font-size:13px;line-height:1.65;}
#glog::-webkit-scrollbar{width:5px;}
#glog::-webkit-scrollbar-thumb{background:var(--border);}
.gm{margin-bottom:1px;white-space:pre-wrap;word-break:break-word;}
.gm-game{color:var(--text);}
.gm-prompt{color:var(--blue);}
.gm-combat{color:#ff8a65;}
.gm-victory{color:var(--gold);font-weight:bold;}
.gm-death{color:var(--red);}
.gm-info{color:#80cbc4;}
.gm-system{color:var(--dim);font-style:italic;}
.gm-levelup{color:var(--gold);background:#1a1500;border:1px solid var(--gold);padding:3px 8px;border-radius:3px;display:inline-block;margin:3px 0;}
.combat-menu{background:#0a1a0a;border:1px solid #2d4a2d;border-radius:4px;padding:5px 9px;margin:3px 0;color:#81c784;}
#ginput{display:flex;gap:6px;padding:8px 12px;border-top:1px solid var(--border);flex-shrink:0;}
#cmd{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:7px 11px;font-family:'Courier New',monospace;font-size:13px;border-radius:4px;outline:none;}
#cmd:focus{border-color:var(--gold);}
#cmd:disabled{opacity:.4;}
#cmd::placeholder{color:var(--dim);}
#sbtn{background:var(--gold);border:none;color:#000;padding:7px 14px;font-weight:bold;cursor:pointer;border-radius:4px;font-family:monospace;font-size:12px;}
#sbtn:disabled{opacity:.4;cursor:default;}
</style>
</head>
<body>

<!-- LOGIN / REGISTRO -->
<div id="lo">
  <div id="lb">
    <h1>⚔ MUD MULTIPLAYER</h1>
    <p>Juega directamente en el navegador</p>

    <div id="login-ip">
      Servidor: <input id="sip" type="text" value="https://the-return-to-highdown.onrender.com" placeholder="tu-app.onrender.com">
    </div>

    <div class="tabs">
      <button class="tab active" onclick="showTab('login')">Iniciar sesión</button>
      <button class="tab" onclick="showTab('register')">Crear cuenta</button>
    </div>

    <!-- LOGIN -->
    <div id="login-panel">
      <input class="li" id="lu" type="text"     placeholder="Usuario" autocomplete="off">
      <input class="li" id="lp" type="password" placeholder="Contraseña">
      <button id="lbtn" onclick="doLogin()">ENTRAR</button>
    </div>

    <!-- REGISTRO -->
    <div id="reg-panel">
      <input class="li" id="ru"  type="text"     placeholder="Usuario (mín. 3 caracteres)" autocomplete="off">
      <input class="li" id="rp1" type="password" placeholder="Contraseña (mín. 4 caracteres)">
      <input class="li" id="rp2" type="password" placeholder="Repetir contraseña">
      <input class="li" id="rn"  type="text"     placeholder="Nombre en el juego">
      <button id="lbtn" onclick="doRegister()">CREAR CUENTA</button>
    </div>

    <div id="lerr"></div>
  </div>
</div>

<!-- TOPBAR -->
<div id="top">
  <div id="top-title">⚔ MUD</div>
  <div id="top-player">—</div>
  <div id="cdot"></div>
</div>

<!-- APP -->
<div id="app">

  <!-- STATS -->
  <div id="sp">
    <div class="sh">Personaje</div>
    <div class="pid">
      <div class="pid-n" id="s-nm">—</div>
      <div class="pid-c" id="s-cl">—</div>
    </div>

    <div>
      <div class="lvr">
        <span style="color:var(--dim);font-size:10px">Nivel</span>
        <span class="lvb" id="s-nv">1</span>
      </div>
      <div style="margin-top:3px">
        <div class="bl"><span class="bl-n">XP</span><span id="s-xp">0/150</span></div>
        <div class="xw"><div class="bf bf-xp" id="b-xp" style="width:0%"></div></div>
      </div>
    </div>

    <div class="sh">Vida &amp; Mana</div>
    <div>
      <div class="bl"><span class="bl-n">❤ HP</span><span id="s-hp">—</span></div>
      <div class="bw"><div class="bf bf-hp" id="b-hp" style="width:100%"></div></div>
      <div class="bl"><span class="bl-n">✦ Mana</span><span id="s-mp">—</span></div>
      <div class="bw"><div class="bf bf-mp" id="b-mp" style="width:100%"></div></div>
    </div>

    <div class="sh">Combate</div>
    <div>
      <div class="sr"><span class="sr-l">Daño base</span>     <span class="sr-v" id="s-dmg">—</span></div>
      <div class="sr"><span class="sr-l">Ataques/turno</span> <span class="sr-v" id="s-atq" style="color:var(--green)">—</span></div>
      <div class="sr"><span class="sr-l">Coste especial</span><span class="sr-v" id="s-mc"  style="color:var(--mana)">—</span></div>
      <div class="sr"><span class="sr-l">Monedas</span>       <span class="sr-v" id="s-mo"  style="color:var(--gold)">—</span></div>
    </div>

    <div class="sh">Acciones rápidas</div>
    <div class="qbtns">
      <button class="qb combat" onclick="send('1')">1 Atacar</button>
      <button class="qb combat" onclick="send('2')">2 Especial</button>
      <button class="qb combat" onclick="send('3')">3 Pasar</button>
      <button class="qb combat" onclick="send('4')">4 Objeto</button>
    </div>
    <div class="qbtns" style="margin-top:3px">
      <button class="qb move" onclick="send('n')">↑N</button>
      <button class="qb move" onclick="send('s')">↓S</button>
      <button class="qb move" onclick="send('e')">→E</button>
      <button class="qb move" onclick="send('o')">←O</button>
    </div>
    <div class="qbtns" style="margin-top:3px">
      <button class="qb" onclick="send('mirar')">👁 Mirar</button>
      <button class="qb" onclick="send('atacar')">⚔ Atacar</button>
      <button class="qb" onclick="send('stats')">📊 Stats</button>
      <button class="qb" onclick="send('ayuda')">❓ Ayuda</button>
      <button class="qb" onclick="send('tienda')">🏪 Tienda</button>
      <button class="qb" onclick="send('hospital')">🏥 Hospital</button>
      <button class="qb" onclick="send('grupo')">👥 Grupo</button>
      <button class="qb" onclick="send('jugadores')">🌍 Jugadores</button>
    </div>
  </div>

  <!-- GAME LOG + INPUT -->
  <div id="gp">
    <div id="glog"></div>
    <div id="ginput">
      <input id="cmd" type="text" placeholder="Escribe un comando... (ayuda para ver todos)" disabled
             autocomplete="off" spellcheck="false"
             onkeydown="if(event.key==='Enter') doSend()">
      <button id="sbtn" onclick="doSend()" disabled>Enviar</button>
    </div>
  </div>

</div>

<script>
/* ── STATE ── */
let ws=null, hist=[], hidx=-1;

/* ── TABS LOGIN/REGISTRO ── */
function showTab(t){
  document.getElementById('login-panel').style.display = t==='login'?'block':'none';
  document.getElementById('reg-panel').style.display   = t==='register'?'block':'none';
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('active', (i===0&&t==='login')||(i===1&&t==='register'));
  });
}
showTab('login');

/* ── CONEXIÓN ── */
function getWsUrl(){
  const ip=document.getElementById('sip').value.trim();
  return (ip.startsWith('localhost')||ip.startsWith('127.')||ip.startsWith('192.')||ip.startsWith('10.'))
    ? `ws://${ip}`
    : `wss://${ip}`;
}

function doLogin(){
  const user=document.getElementById('lu').value.trim();
  const pass=document.getElementById('lp').value;
  const err=document.getElementById('lerr');
  if(!user||!pass){err.textContent='Rellena usuario y contraseña.';return;}
  err.textContent='Conectando...';
  connect({type:'game_auth',usuario:user,password:pass});
}

function doRegister(){
  const u  =document.getElementById('ru').value.trim();
  const p1 =document.getElementById('rp1').value;
  const p2 =document.getElementById('rp2').value;
  const nom=document.getElementById('rn').value.trim()||u;
  const err=document.getElementById('lerr');
  if(!u||!p1||!p2){err.textContent='Rellena todos los campos.';return;}
  if(u.length<3){err.textContent='Usuario: mínimo 3 caracteres.';return;}
  if(p1.length<4){err.textContent='Contraseña: mínimo 4 caracteres.';return;}
  if(p1!==p2){err.textContent='Las contraseñas no coinciden.';return;}
  err.textContent='Conectando...';
  connect({type:'game_register',usuario:u,password:p1,nombre:nom});
}

function connect(authMsg){
  const url=getWsUrl();
  ws=new WebSocket(url);
  ws.onopen=()=>ws.send(JSON.stringify(authMsg));
  ws.onmessage=e=>{try{handle(JSON.parse(e.data));}catch(_){}};
  ws.onclose=()=>{
    setConn(false);
    document.getElementById('cmd').disabled=true;
    document.getElementById('sbtn').disabled=true;
    appendLog('Conexión cerrada con el servidor.','gm-death');
  };
  ws.onerror=()=>{
    document.getElementById('lerr').textContent='No se pudo conectar. ¿Servidor corriendo?';
    ws=null;
  };
}

['lu','lp','ru','rp1','rp2','rn','sip'].forEach(id=>{
  const el=document.getElementById(id);
  if(el) el.addEventListener('keydown',e=>{if(e.key==='Enter') id.startsWith('r')?doRegister():doLogin();});
});

/* ── MENSAJES ENTRANTES ── */
function handle(m){
  if(m.type==='auth_ok'){
    document.getElementById('lo').style.display='none';
    setConn(true);
    document.getElementById('cmd').disabled=false;
    document.getElementById('sbtn').disabled=false;
    document.getElementById('cmd').focus();
  } else if(m.type==='auth_fail'){
    document.getElementById('lerr').textContent=m.msg||'Error de autenticación';
    ws=null;
  } else if(m.type==='game'){
    appendLog(m.text, classify(m.text));
  } else if(m.type==='prompt'){
    appendLog(m.text,'gm-prompt');
  } else if(m.type==='combat_menu'){
    appendLog(m.text,'combat-menu',true);
  } else if(m.type==='levelup'){
    appendLog(m.text,'gm-levelup');
  } else if(m.type==='status'){
    updateStats(m);
  } else if(m.type==='chat'){
    const tag=m.scope==='sala'?'[Sala]':'[Global]';
    appendLog(`${tag} ${m.nombre}: ${m.text}`,'gm-info');
  }
}

function classify(t){
  const l=t.toLowerCase();
  if(l.includes('victoria')||l.includes('🏆')) return 'gm-victory';
  if(l.includes('caido')||l.includes('derrota')||l.includes('muerto')) return 'gm-death';
  if(l.includes('turno')||l.includes('combate')||l.includes('ataca')||
     l.includes('golpea')||l.includes('especial')) return 'gm-combat';
  if(l.includes('+')&&(l.includes('xp')||l.includes('hp')||l.includes('mana'))) return 'gm-info';
  return 'gm-game';
}

/* ── GAME LOG ── */
function appendLog(text, cls, isBlock=false){
  const log=document.getElementById('glog');
  if(isBlock){
    const d=document.createElement('div');
    d.className='gm '+cls;d.textContent=text;
    log.appendChild(d);
  } else {
    text.split('\n').forEach(line=>{
      const d=document.createElement('div');
      d.className='gm '+cls;d.textContent=line;
      log.appendChild(d);
    });
  }
  log.scrollTop=log.scrollHeight;
}

/* ── STATS ── */
function updateStats(s){
  document.getElementById('s-nm').textContent=s.nombre||'—';
  document.getElementById('s-cl').textContent=s.clase?(s.clase[0].toUpperCase()+s.clase.slice(1)):'—';
  document.getElementById('s-nv').textContent='Nv.'+s.nivel;
  document.getElementById('top-player').innerHTML=
    '<span>'+esc(s.nombre)+'</span> ['+esc(s.clase)+'] Nv.'+s.nivel;

  const xpPct=s.xpMax>0?Math.min(100,s.xp/s.xpMax*100):0;
  document.getElementById('b-xp').style.width=xpPct+'%';
  document.getElementById('s-xp').textContent=s.xp+'/'+s.xpMax;

  const hpPct=s.hpMax>0?Math.min(100,s.hp/s.hpMax*100):0;
  const bh=document.getElementById('b-hp');
  bh.style.width=hpPct+'%';
  bh.style.background=hpPct<25?'var(--red2)':hpPct<50?'#f57f17':'var(--red)';
  document.getElementById('s-hp').textContent=s.hp+'/'+s.hpMax;

  const mpPct=s.manaMax>0?Math.min(100,s.mana/s.manaMax*100):0;
  document.getElementById('b-mp').style.width=mpPct+'%';
  document.getElementById('s-mp').textContent=s.mana+'/'+s.manaMax;

  const atqs=s.ataquesTurno;
  document.getElementById('s-dmg').textContent=s.danioBase||'—';
  document.getElementById('s-atq').textContent=Array.isArray(atqs)?atqs[0]+'-'+atqs[1]:String(atqs||'—');
  document.getElementById('s-mc').textContent=(s.costoEspecial||0)+' mana';
  document.getElementById('s-mo').textContent=s.monedas+' 💰';
}

/* ── ENVÍO ── */
function send(text){
  if(!ws||ws.readyState!==WebSocket.OPEN) return;
  ws.send(text);
}

function doSend(){
  const inp=document.getElementById('cmd');
  const cmd=inp.value.trim();
  if(!cmd) return;
  hist.unshift(cmd);if(hist.length>50)hist.pop();hidx=-1;
  send(cmd);
  appendLog('> '+cmd,'gm-system');
  inp.value='';
}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('cmd').addEventListener('keydown',e=>{
    if(e.key==='ArrowUp'){hidx=Math.min(hidx+1,hist.length-1);e.target.value=hist[hidx]||'';e.preventDefault();}
    else if(e.key==='ArrowDown'){hidx=Math.max(hidx-1,-1);e.target.value=hidx===-1?'':hist[hidx];e.preventDefault();}
  });
});

function setConn(on){document.getElementById('cdot').className=on?'on':'';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body>
</html>
